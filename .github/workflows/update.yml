name: 每日自動更新股價大腦

on:
  schedule:
    - cron: '30 9 * * 1-5' 
  workflow_dispatch: 

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下載源碼
        uses: actions/checkout@v4  # 🌟 升級做 v4

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5  # 🌟 升級做 v5
        with:
          python-version: '3.10'

      - name: 📦 安裝依賴套件
        run: |
          pip install firebase-admin yfinance pytz pandas

      - name: 🚀 執行報價更新腳本
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python update_prices.py
