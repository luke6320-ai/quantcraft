<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuantCraft HK - 雲端版</title>
    <style>
        /* --- 基礎設定 --- */
        body { margin: 0; padding: 0; background-color: #121212; color: #ffffff; font-family: sans-serif; padding-bottom: 80px; }
        .top-bar { display: flex; justify-content: space-between; padding: 20px; }
        .top-icons span { font-size: 1.2rem; margin-left: 15px; cursor: pointer; }
        
        /* --- 卡片與總資產 (Dashboard) --- */
        .hero-card { background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%); margin: 0 20px; padding: 25px 20px; border-radius: 20px; text-align: center; }
        .net-worth-title { color: #aaaaaa; font-size: 0.9rem; margin-bottom: 5px; }
        .net-worth-value { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .daily-pl { font-size: 1rem; margin-top: 5px; font-weight: bold; } 
        .profit { color: #00E676; } .loss { color: #FF1744; }
        
        .account-tabs { display: flex; justify-content: center; margin-top: 20px; gap: 10px; }
        .tab { background-color: #333; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; color: #ccc; cursor: pointer; }
        .tab.active { background-color: #007AFF; color: white; font-weight: bold; }

        /* --- 列表與通用組件 --- */
        .section-container { padding: 20px; }
        .section-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #eeeeee; }
        .list-row { background-color: #1e1e1e; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row-info h4 { margin: 0; font-size: 1.1rem; }
        .row-info p { margin: 5px 0 0 0; font-size: 0.8rem; color: #aaa; }
        .row-right { text-align: right; }
        .row-right h4 { margin: 0; font-size: 1.1rem; }
        .row-right p { margin: 5px 0 0 0; font-size: 0.8rem; font-weight: bold;}
        
        .tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;}
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 8px; }
        .tag-green { background-color: rgba(0, 230, 118, 0.2); color: #00E676; border: 1px solid #00E676; }
        .tag-red { background-color: rgba(255, 23, 68, 0.2); color: #FF1744; border: 1px solid #FF1744; }
        .tag-blue { background-color: rgba(0, 122, 255, 0.2); color: #4DA8DA; border: 1px solid #007AFF; cursor: pointer;}
        
        .health-score { display: inline-block; margin-top: 5px; background-color: #333; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .score-high { color: #FFD700; } .score-low { color: #FF8C00; }
        .delete-btn { background: none; border: none; color: #888; font-size: 1.2rem; cursor: pointer; padding: 5px; margin-left: 10px;}

        /* --- 策略頁面專用 --- */
        .block-container { background-color: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed #555;}
        .scan-btn { width: 100%; background-color: #00E676; color: #000; font-weight: bold; padding: 15px; border-radius: 15px; border: none; font-size: 1.1rem; cursor: pointer; margin-top: 10px;}

        /* --- 導航與浮動按鈕 --- */
        .fab { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background-color: #007AFF; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4); cursor: pointer; z-index: 10; transition: transform 0.2s;}
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #1e1e1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 10; }
        .nav-item { text-align: center; color: #888; font-size: 0.8rem; cursor: pointer; width: 50%;}
        .nav-item.active { color: #007AFF; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 3px; }

        /* --- 彈出視窗 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: center; }
        .modal-content { background-color: #1e1e1e; padding: 25px; border-radius: 20px; width: 80%; max-width: 350px; }
        .modal-content h3 { margin-top: 0; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; background-color: #333; border: 1px solid #555; color: white; border-radius: 8px; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: space-between; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background-color: #555; color: white; }
        .btn-save { background-color: #007AFF; color: white; }
        
        /* 雲端載入中的提示 */
        #loading-msg { text-align: center; color: #888; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="greeting">早晨, Terry ☁️</div>
        <div class="top-icons">
            <span title="隱藏金額" id="toggle-visibility">👁️</span>
        </div>
    </div>

    <div id="page-dashboard">
        <div class="hero-card">
            <div class="net-worth-title">雲端總資產 (HKD)</div>
            <h1 class="net-worth-value" id="total-asset">$0.00</h1>
            <div class="daily-pl profit" id="daily-pl">+$0.00 (0.00%)</div>
            
            <div class="account-tabs" id="tabs-container">
                <div class="tab active" onclick="switchTab('全部')">全部</div>
                <div class="tab" onclick="switchTab('富途')">富途</div>
                <div class="tab" onclick="switchTab('匯豐')">匯豐</div>
                <div class="tab" onclick="switchTab('IB')">IB</div>
            </div>
        </div>

        <div class="section-container" id="holdings-list">
            <div id="loading-msg">🔄 正在連線 Firebase 讀取雲端資料...</div>
        </div>
    </div>

    <div id="page-strategy" style="display: none;">
        <div class="section-container">
            <div class="section-title">我的自訂積木策略</div>
            <div class="block-container">
                <p style="margin-top:0; color:#aaa; font-size:0.9rem;">當前觸發條件：</p>
                <div class="tags" id="strategy-blocks">
                    <div class="tag tag-blue">技術面: RSI < 30 (超賣) ✕</div>
                    <div class="tag tag-blue">基本面: 股息率 > 6% ✕</div>
                </div>
                <button class="scan-btn" onclick="runScan()">🔍 執行策略掃描</button>
            </div>

            <div class="section-title" id="scan-result-title" style="display:none;">今日符合標的 (2)</div>
            <div id="scan-results" style="display:none;">
                <div class="list-row">
                    <div class="row-info">
                        <h4>3319.HK 雅生活服務</h4>
                        <div class="tags"><div class="tag tag-green">股息: 7.9%</div></div>
                    </div>
                    <div class="row-right">
                        <h4>$1.71</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fab" id="add-btn">+</div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')"><span>📊</span>看板</div>
        <div class="nav-item" id="nav-strategy" onclick="switchPage('strategy')"><span>🧩</span>策略</div>
    </div>

    <div class="modal" id="add-modal">
        <div class="modal-content">
            <h3>新增雲端交易紀錄</h3>
            <select id="input-account">
                <option value="富途">富途戶口</option>
                <option value="匯豐">匯豐戶口</option>
                <option value="IB">IB戶口</option>
            </select>
            <input type="text" id="input-symbol" placeholder="股票代號 (例: 0005.HK)">
            <input type="number" id="input-shares" placeholder="持有股數 (例: 400)">
            <input type="number" id="input-cost" placeholder="平均成本價">
            <input type="number" id="input-price" placeholder="當前市價">
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="btn-cancel">取消</button>
                <button class="btn btn-save" id="btn-save">上傳雲端</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. 你的專屬 Firebase 鎖匙
        const firebaseConfig = {
            apiKey: "AIzaSyBVrn8Dp88LDKHEssp1OZTQ1_G7lwb9znE",
            authDomain: "quantcraft-c0a8b.firebaseapp.com",
            projectId: "quantcraft-c0a8b",
            storageBucket: "quantcraft-c0a8b.firebasestorage.app",
            messagingSenderId: "448273574587",
            appId: "1:448273574587:web:3c95f1ba75a6fcb405179e"
        };

        // 2. 啟動 Firebase 與資料庫
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 全局變數 ---
        const modal = document.getElementById('add-modal');
        const holdingsList = document.getElementById('holdings-list');
        const totalAssetEl = document.getElementById('total-asset');
        const dailyPlEl = document.getElementById('daily-pl');
        let isHidden = false;
        let currentTab = '全部';
        let myStocks = []; // 現在預設是空的，等雲端下載

        // --- 核心功能 1：從雲端下載資料 ---
        async function fetchStocksFromCloud() {
            try {
                // 每次讀取前清空陣列
                myStocks = []; 
                // 指向 Firebase 的 "stocks" 資料夾
                const querySnapshot = await getDocs(collection(db, "stocks")); 
                
                querySnapshot.forEach((doc) => {
                    // 將資料庫 ID 一併存起來，方便之後刪除
                    myStocks.push({ id: doc.id, ...doc.data() });
                });
                
                renderStocks(); // 下載完畢，畫出畫面
            } catch (error) {
                console.error("讀取資料庫失敗:", error);
                holdingsList.innerHTML = `<div id="loading-msg" style="color:#FF1744;">❌ 無法連線至資料庫，請檢查 Firebase 安全規則是否設為 test mode。</div>`;
            }
        }

        // --- 核心功能 2：畫出畫面 ---
        function renderStocks() {
            holdingsList.innerHTML = `<div class="section-title">${currentTab} 持倉診斷</div>`;
            let totalAssetValue = 0, totalCostValue = 0;
            const filteredStocks = currentTab === '全部' ? myStocks : myStocks.filter(s => s.account === currentTab);

            if(filteredStocks.length === 0) holdingsList.innerHTML += `<p style="color:#888; text-align:center;">此戶口目前沒有持倉</p>`;

            filteredStocks.forEach((stock, index) => {
                let currentValue = stock.shares * stock.price;
                let costValue = stock.shares * stock.cost;
                let profitLoss = currentValue - costValue;
                
                let plClass = profitLoss >= 0 ? 'profit' : 'loss';
                let plSign = profitLoss >= 0 ? '+' : '';
                let tagHtml = profitLoss >= 0 ? `<div class="tag tag-green">強勢向上</div>` : `<div class="tag tag-red">弱勢回調</div>`;

                totalAssetValue += currentValue;
                totalCostValue += costValue;

                const stockHTML = `
                    <div class="list-row">
                        <div class="row-info">
                            <h4>${stock.symbol} <span style="font-size:0.7rem; color:#888;">(${stock.account})</span></h4>
                            <p>成本: $${stock.cost} | ${stock.shares}股</p>
                            <div class="tags">${tagHtml}</div>
                        </div>
                        <div class="row-right">
                            <h4>$${stock.price}</h4>
                            <p class="${plClass}">${plSign}$${profitLoss.toFixed(2)}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteStock('${stock.id}', ${index})">🗑️</button>
                    </div>
                `;
                holdingsList.innerHTML += stockHTML;
            });

            let totalPL = totalAssetValue - totalCostValue;
            let plPercentage = totalCostValue > 0 ? (totalPL / totalCostValue) * 100 : 0;
            if (!isHidden) {
                totalAssetEl.innerText = '$' + totalAssetValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                dailyPlEl.innerText = `${totalPL >= 0 ? '+' : ''}$${Math.abs(totalPL).toLocaleString('en-US', {minimumFractionDigits: 2})} (${totalPL >= 0 ? '+' : ''}${plPercentage.toFixed(2)}%)`;
                dailyPlEl.className = `daily-pl ${totalPL >= 0 ? 'profit' : 'loss'}`;
            }
        }

        // --- 暴露給 HTML onClick 使用的函數 (因為 module 具有封閉性) ---
        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.innerText === tabName ? t.classList.add('active') : t.classList.remove('active'));
            renderStocks(); 
        };

        window.switchPage = function(page) {
            document.getElementById('page-dashboard').style.display = page === 'dashboard' ? 'block' : 'none';
            document.getElementById('page-strategy').style.display = page === 'strategy' ? 'block' : 'none';
            document.getElementById('nav-dashboard').classList.toggle('active', page === 'dashboard');
            document.getElementById('nav-strategy').classList.toggle('active', page === 'strategy');
            document.getElementById('add-btn').style.transform = page === 'dashboard' ? 'scale(1)' : 'scale(0)';
        };

        window.runScan = function() {
            const btn = document.querySelector('.scan-btn');
            btn.innerText = '🔄 正在掃描全港股...';
            setTimeout(() => {
                document.getElementById('scan-result-title').style.display = 'block';
                document.getElementById('scan-results').style.display = 'block';
                btn.innerText = '✅ 掃描完成 (最新數據)';
            }, 1000);
        };

        // --- 核心功能 3：刪除雲端資料 ---
        window.deleteStock = async function(docId, index) {
            if(confirm("確定要從雲端刪除這筆紀錄嗎？")) {
                try {
                    await deleteDoc(doc(db, "stocks", docId)); // 刪除 Firebase 資料
                    myStocks.splice(index, 1); // 刪除本地陣列
                    renderStocks(); // 重新畫圖
                } catch (error) {
                    alert("刪除失敗！" + error.message);
                }
            }
        };

        // --- 核心功能 4：上傳新資料到雲端 ---
        document.getElementById('btn-save').addEventListener('click', async () => {
            const saveBtn = document.getElementById('btn-save');
            saveBtn.innerText = "上傳中...";
            saveBtn.disabled = true;

            const newStock = {
                account: document.getElementById('input-account').value,
                symbol: document.getElementById('input-symbol').value,
                shares: parseFloat(document.getElementById('input-shares').value),
                cost: parseFloat(document.getElementById('input-cost').value),
                price: parseFloat(document.getElementById('input-price').value)
            };

            if(!newStock.symbol || isNaN(newStock.shares) || isNaN(newStock.cost) || isNaN(newStock.price)) { 
                alert("請填寫完整且正確的數字！"); 
                saveBtn.innerText = "上傳雲端"; saveBtn.disabled = false;
                return; 
            }

            try {
                // 將資料新增至 Firebase 的 "stocks" 集合中
                const docRef = await addDoc(collection(db, "stocks"), newStock);
                
                // 成功後，將帶有雲端 ID 的資料放回本地陣列並重新畫圖
                myStocks.push({ id: docRef.id, ...newStock });
                
                if(currentTab !== '全部' && currentTab !== newStock.account) switchTab('全部');
                else renderStocks();
                
                modal.style.display = 'none';
                document.getElementById('input-symbol').value = '';
                document.getElementById('input-shares').value = '';
                document.getElementById('input-cost').value = '';
                document.getElementById('input-price').value = '';
            } catch (error) {
                alert("上傳失敗！" + error.message);
            } finally {
                saveBtn.innerText = "上傳雲端"; saveBtn.disabled = false;
            }
        });

        // 打開/關閉 Modal 與 隱藏金額
        document.getElementById('add-btn').addEventListener('click', () => modal.style.display = 'flex');
        document.getElementById('btn-cancel').addEventListener('click', () => modal.style.display = 'none');
        document.getElementById('toggle-visibility').addEventListener('click', function() {
            isHidden = !isHidden;
            if(isHidden) {
                totalAssetEl.innerText = '********'; dailyPlEl.innerText = '****'; dailyPlEl.className = 'daily-pl'; this.innerText = '🙈';
            } else { this.innerText = '👁️'; renderStocks(); }
        });

        // 🚀 網頁一打開，立刻執行雲端下載！
        fetchStocksFromCloud();
    </script>
</body>
</html>
