<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuantCraft HK - 專業交易帳本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- 基礎與全局設定 --- */
        body { margin: 0 auto; padding: 0; background-color: #121212; color: #ffffff; font-family: sans-serif; max-width: 500px; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.8); position: relative; overflow-x: hidden;}
        .hidden { display: none !important; }
        
        /* --- 登入畫面 --- */
        #auth-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%); }
        .auth-box { background-color: #1e1e1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .auth-box h2 { margin-top: 0; color: #007AFF; }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 15px; background-color: #333; border: 1px solid #555; color: white; border-radius: 8px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background-color: #007AFF; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .auth-switch { color: #888; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: block;}
        .auth-error { color: #FF1744; font-size: 0.8rem; margin-bottom: 10px; min-height: 15px; }
        .google-btn { background-color: #ffffff; color: #000000; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #ddd; margin-top: 15px;}
        .divider { display: flex; align-items: center; text-align: center; color: #555; font-size: 0.8rem; margin: 15px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .25em; } .divider:not(:empty)::after { margin-left: .25em; }

        /* --- 主程式畫面 --- */
        #app-screen { padding-bottom: 80px; min-height: 100vh; display: flex; flex-direction: column;}
        .top-bar { display: flex; justify-content: space-between; padding: 20px; align-items: center;}
        .top-icons { display: flex; align-items: center; gap: 8px; }
        .top-icons span { font-size: 1.2rem; cursor: pointer; }
        .logout-btn { font-size: 0.8rem; background-color: #333; padding: 5px 10px; border-radius: 8px; cursor: pointer; color: #aaa; border: none;}
        .csv-btn { font-size: 0.75rem; background-color: #00E676; color: #000; padding: 6px 8px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; display: flex; align-items: center; gap: 4px; white-space: nowrap;}
        .csv-btn.export { background-color: #4DA8DA; color: #fff; }
        .csv-btn.refresh { background-color: #FFD700; color: #000; }

        /* --- 卡片與戶口標籤 --- */
        .hero-card { background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%); margin: 0 20px; padding: 25px 20px; border-radius: 20px; text-align: center; position: relative;}
        .net-worth-title { color: #aaaaaa; font-size: 0.9rem; margin-bottom: 5px; }
        .net-worth-value { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .profit { color: #00E676; } .loss { color: #FF1744; }
        .last-update-label { font-size: 0.75rem; color: #888; margin-top: 15px; font-style: italic; }

        /* 🌟 重新排版：解決手機螢幕太窄字體重疊問題 */
        .summary-box { display: flex; flex-wrap: wrap; background: rgba(0,0,0,0.25); margin-top: 15px; padding: 12px; border-radius: 12px; font-size: 0.85rem; border: 1px solid #333; gap: 12px 0;}
        .summary-item { display: flex; flex-direction: column; align-items: center; width: 50%; box-sizing: border-box;}
        .summary-item:nth-child(1) { border-right: 1px solid #444; }
        /* 累積回報率放底層霸全行，保證唔會疊字 */
        .summary-item.full-width { width: 100%; border-top: 1px dashed #444; padding-top: 12px; }
        .summary-label { color: #aaa; font-size: 0.75rem;}
        .summary-val { font-weight: bold; font-size: 1rem; margin-top: 4px;}

        .account-tabs { display: flex; justify-content: center; margin-top: 20px; gap: 10px; flex-wrap: wrap; }
        .tab { background-color: #333; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; color: #ccc; cursor: pointer; }
        .tab.active { background-color: #007AFF; color: white; font-weight: bold; }
        .tab-manage { background-color: #555; }

        /* --- 圖表與列表 --- */
        .chart-wrapper { background-color: #1e1e1e; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; }
        .chart-title { text-align: center; font-size: 0.9rem; color: #aaa; margin-top: 0; margin-bottom: 15px; font-weight: bold;}
        .section-container { padding: 0 20px 20px 20px; flex: 1;}
        .section-title { font-size: 1.1rem; font-weight: bold; color: #eeeeee; margin: 0;}
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #sort-holdings { background: #333; color: #ccc; border: none; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; outline: none; cursor: pointer;}
        .list-row { background-color: #1e1e1e; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; transition: border 0.2s;}
        .row-info { flex: 1; }
        .row-info h4 { margin: 0; font-size: 1.1rem; }
        .row-info p { margin: 5px 0 0 0; font-size: 0.8rem; color: #aaa; }
        .row-right { text-align: right; margin-left: 10px; }
        .row-right h4 { margin: 0; font-size: 1.1rem; }
        .tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;}
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 8px; }
        .tag-green { background-color: rgba(0, 230, 118, 0.2); color: #00E676; border: 1px solid #00E676; }
        .tag-red { background-color: rgba(255, 23, 68, 0.2); color: #FF1744; border: 1px solid #FF1744; }
        .prof-panel { font-size: 0.75rem; color: #aaa; margin-top: 10px; border-top: 1px dashed #444; padding-top: 8px; line-height: 1.5; }
        .prof-panel span.val { font-weight: bold; color: #ddd; }

        /* 🌟 策略專頁 CSS */
        .strategy-card { background-color: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .strategy-card h3 { margin-top: 0; color: #4DA8DA; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1.1rem;}
        .strat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #333; }
        .strat-row:last-child { border-bottom: none; padding-bottom: 0;}
        .strat-name { font-weight: bold; font-size: 1rem; color:#fff;}
        .strat-val { font-size: 0.9rem; font-weight: bold;}
        .progress-bg { background: #333; height: 8px; border-radius: 4px; position: relative; overflow: hidden; margin-top: 8px; width: 100%;}
        .progress-bar { height: 100%; border-radius: 4px; }

        /* --- 導航與浮動按鈕 --- */
        .fab { position: fixed; bottom: 90px; left: 50%; margin-left: 160px; width: 60px; height: 60px; background-color: #007AFF; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4); cursor: pointer; z-index: 10; transition: transform 0.2s;}
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background-color: #1e1e1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 10; }
        .nav-item { text-align: center; color: #888; font-size: 0.8rem; cursor: pointer; width: 50%;}
        .nav-item.active { color: #007AFF; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 3px; }

        /* --- 彈出視窗 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: center; }
        .modal-content { background-color: #1e1e1e; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto;}
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; color: #eee;}
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; background-color: #333; border: 1px solid #555; color: white; border-radius: 8px; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 10px;}
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background-color: #555; color: white; }
        .btn-save { background-color: #007AFF; color: white; }
        .api-search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .api-search-box input { margin-bottom: 0; flex: 1; }
        .api-fetch-btn { background-color: #FFD700; color: #000; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .acc-manage-row { padding: 15px; background-color: #2c2c2c; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px;}
        .acc-manage-title { font-weight: bold; font-size: 1.1rem; color: #fff;}
        .acc-manage-actions { display: flex; gap: 8px; width: 100%; }
        .acc-manage-actions button { flex: 1; border: none; border-radius: 5px; padding: 8px 0; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-edit { background: #FFD700; color: #000; }
        .btn-delete { background: #444; color: white; }
        .btn-clear { background: #9966FF; color: white; } 
        .history-item { padding: 12px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .history-item:last-child { border-bottom: none; }
        .type-buy { color: #00E676; font-weight: bold; }
        .type-sell { color: #FF1744; font-weight: bold; }
        .history-detail p { margin: 4px 0 0 0; font-size: 0.85rem; color: #bbb;}
        .history-actions { display: flex; gap: 15px; }
        .history-edit { background: none; border: none; color: #FFD700; cursor: pointer; font-size: 1.3rem; padding: 0;}
        .history-delete { background: none; border: none; color: #888; cursor: pointer; font-size: 1.3rem; padding: 0;}
        @media (max-width: 500px) { .fab { left: auto; right: 20px; margin-left: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>QuantCraft HK</h2>
            <div id="auth-error" class="auth-error"></div>

                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                使用 Google 登入
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="top-bar">
            <div class="top-icons">
                <input type="file" id="csv-file-input" accept=".csv" class="hidden">
                <button class="csv-btn" onclick="document.getElementById('csv-file-input').click()" title="匯入 CSV">📁 匯入</button>
                <button class="csv-btn export" onclick="exportCSV()" title="匯出 CSV">📤 匯出</button>

            <div class="top-icons">

        <div id="page-dashboard">

                <div class="net-worth-title">總資產現值 (HKD)</div>
                <h1 class="net-worth-value" id="total-asset">$0.00</h1>
                
                <div class="summary-box" id="summary-box">
                    <div class="summary-item">

            <div class="chart-wrapper" id="chart-section">

            <div class="section-container">

        <div class="fab" id="add-btn">+</div>

            <div class="nav-item" onclick="switchPage('strategy')"><span>🧩</span>策略</div>
        </div>

            <div class="modal-content">

                    <select id="input-type" style="flex:1; margin-bottom:0; font-weight:bold;">

                    <button class="btn btn-cancel" onclick="document.getElementById('history-modal').style.display='none'">關閉</button>

            </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, writeBatch, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, EmailAuthProvider, reauthenticateWithCredential, reauthenticateWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVrn8Dp88LDKHEssp1OZTQ1_G7lwb9znE",
            authDomain: "quantcraft-c0a8b.firebaseapp.com",
            projectId: "quantcraft-c0a8b",
            storageBucket: "quantcraft-c0a8b.firebasestorage.app",
            messagingSenderId: "448273574587",
            appId: "1:448273574587:web:3c95f1ba75a6fcb405179e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null; 
        let transactions = []; 
        let marketPrices = {}; 
        let stockDetails = {}; 
        let myAccounts = ['富途', '匯豐', 'IB']; 
        let currentTab = '全部';
        let isHidden = false;
        let lastUpdatedTime = "從未更新"; 
        
        let portfolioChart = null; 
        let cloudStockNames = {}; 
        let editingTxnId = null;

        function cleanTicker(rawSymbol) {
            if (!rawSymbol) return "";
            let clean = rawSymbol.split(' ')[0].trim();
            if (clean.startsWith('HKG:')) clean = clean.replace('HKG:', '') + '.HK';
            if (/^\d{1,5}$/.test(clean)) {
                clean = clean.padStart(4, '0') + '.HK';
            }
            return clean.toUpperCase();
        }

        function getDisplayName(rawSymbol) {
            let cleanSymbol = cleanTicker(rawSymbol);
            if (!cleanSymbol) return "未知股票";
            if (cloudStockNames && cloudStockNames[cleanSymbol]) return `${cleanSymbol} ${cloudStockNames[cleanSymbol]}`;
            return cleanSymbol; 
        }

        function calculateHoldings() {
            let holdingsMap = {};
            transactions.forEach(t => {
                let cleanSym = cleanTicker(t.symbol); let key = t.account + '_' + cleanSym;
                if (!holdingsMap[key]) holdingsMap[key] = { account: t.account, symbol: cleanSym, shares: 0, totalCost: 0, realizedPL: 0, latestDate: 0 };
                let h = holdingsMap[key];
                if (t.timestamp > h.latestDate) h.latestDate = t.timestamp;
                if (t.type === 'BUY') { h.shares += t.shares; h.totalCost += (t.shares * t.price) + t.fee; } 
                else if (t.type === 'SELL') {
                    if (h.shares > 0) {
                        let avgCost = h.totalCost / h.shares; let costOfSold = avgCost * t.shares; let tradePL = (t.shares * t.price) - t.fee - costOfSold;
                        h.realizedPL += tradePL; h.shares -= t.shares; h.totalCost -= costOfSold;
                        if (h.shares <= 0) { h.shares = 0; h.totalCost = 0; } 
                    }
                }
            }); return Object.values(holdingsMap);
        }

                let bPL = (b.shares * bPrice - b.totalCost) + b.realizedPL;
                if (sortMode === 'pl-desc') return bPL - aPL; if (sortMode === 'pl-asc') return aPL - bPL;  
                if (sortMode === 'name') return a.symbol.localeCompare(b.symbol); 
                return (b.latestDate || 0) - (a.latestDate || 0);

                    `;

                    let plClass = pl >= 0 ? 'profit' : 'loss';

                    list.innerHTML += `

                                </p>
                                <div class="tags">${tagsHtml}</div>
                                ${profPanelHtml}
                            </div>
                            <div class="row-right" style="display: flex; flex-direction: column; align-items: flex-end;">
                                <h4 style="margin-bottom: 5px;">$${currentPrice.toFixed(2)}</h4>
                                <div class="${plClass}" style="font-size: 0.95rem; font-weight: bold;">
                                    ${plSign}$${Math.abs(pl).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}
                                </div>
                                <div class="${plClass}" style="font-size: 0.75rem; font-weight: bold; margin-top: 3px; padding: 2px 6px; border-radius: 4px; background: ${plBgColor};">
                                    ${plSign}${Math.abs(plPct).toFixed(2)}%
                                </div>
                            </div>
                        </div>`;
                });
            }

            if (closedHoldings.length > 0) {
                list.innerHTML += `<div class="section-title" style="margin-top:20px; color:#888; border-top:1px solid #333; padding-top:15px;">已平倉紀錄 (已實現盈虧)</div>`;
                closedHoldings.forEach(stock => {
                    let plClass = stock.realizedPL >= 0 ? 'profit' : 'loss'; let plSign = stock.realizedPL >= 0 ? '+' : '';
                    list.innerHTML += `
                        <div class="list-row" onclick="openStockHistory('${stock.account}', '${stock.symbol}')" style="opacity:0.6;">
                            <div class="row-info">
                                <h4>${stock.symbol} <span style="font-size:0.7rem;">(${stock.account})</span></h4>
                                <p>0 股 (已清倉)</p>
                                <div class="tags"><div class="tag" style="background:#555; color:#fff;">歷史紀錄</div></div>
                            </div>
                            <div class="row-right"><h4 style="font-size:0.9rem; color:#aaa;">已實現盈虧</h4><p class="${plClass}">${plSign}$${stock.realizedPL.toFixed(2)}</p></div>
                        </div>`;
                });
            }

            let totalPL = totalVal - totalCost;
            let totalReturnPct = totalCost > 0 ? (totalPL / totalCost * 100).toFixed(2) : '0.00';

            if (!isHidden) {
                document.getElementById('total-asset').innerText = '$' + totalVal.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
                document.getElementById('total-cost').innerText = '$' + totalCost.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
                
                let returnEl = document.getElementById('total-return');
                returnEl.innerText = `${totalPL >= 0 ? '+' : ''}$${Math.abs(totalPL).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})} (${totalPL >= 0 ? '+' : ''}${totalReturnPct}%)`;
                returnEl.className = `summary-val ${totalPL >= 0 ? 'profit' : 'loss'}`;

                let dailyEl = document.getElementById('daily-pl');
                dailyEl.innerText = `${dailyPLVal >= 0 ? '+' : ''}$${Math.abs(dailyPLVal).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`;
                dailyEl.className = `summary-val ${dailyPLVal >= 0 ? 'profit' : 'loss'}`;
            } else {
                document.getElementById('total-asset').innerText = '********';
                document.getElementById('total-cost').innerText = '********';
                
                let returnEl = document.getElementById('total-return');
                returnEl.innerText = '********'; returnEl.className = 'summary-val';
                
                let dailyEl = document.getElementById('daily-pl');
                dailyEl.innerText = '********'; dailyEl.className = 'summary-val';
            }
        }

        // 🌟 策略渲染引擎 (Strategy Rendering Logic)
        window.renderStrategy = function() {
            const peList = document.getElementById('strategy-pe-list');
            const rangeList = document.getElementById('strategy-52w-list');
            peList.innerHTML = ''; rangeList.innerHTML = '';

            let holdings = calculateHoldings();
            let activeHoldings = holdings.filter(h => h.shares > 0);

            if(activeHoldings.length === 0) {
                peList.innerHTML = '<div style="color:#aaa; text-align:center; padding:10px;">無現有持倉</div>';
                rangeList.innerHTML = '<div style="color:#aaa; text-align:center; padding:10px;">無現有持倉</div>';
                return;
            }

            // --- 策略 1: PE 估值分析 ---
            let peData = [];
            activeHoldings.forEach(h => {
                let details = stockDetails[h.symbol] || {};
                let pe = details.pe;
                // 只過濾有正數 PE 的股票 (排除 #N/A 或虧損公司)
                if (pe && pe > 0) peData.push({symbol: h.symbol, pe: pe});
            });
            // 按照 PE 由低至高排序 (越平越前)
            peData.sort((a,b) => a.pe - b.pe); 

            if(peData.length === 0) {
                peList.innerHTML = '<div style="color:#aaa; padding:10px;">未能獲取足夠 P/E 數據</div>';
            } else {
                peData.forEach(item => {
                    let peAdvice = ""; let color = "";
                    if(item.pe < 15) { peAdvice = "偏平"; color = "#00E676"; }
                    else if(item.pe <= 30) { peAdvice = "合理"; color = "#FFD700"; }
                    else { peAdvice = "偏貴"; color = "#FF1744"; }
                    
                    peList.innerHTML += `
                        <div class="strat-row">
                            <div class="strat-name">${item.symbol}</div>
                            <div class="strat-val" style="color:${color}">P/E: ${item.pe.toFixed(2)} <span style="font-size:0.75rem">(${peAdvice})</span></div>
                        </div>
                    `;
                });
            }

            // --- 策略 2: 52週高低位雷達 ---
            let rangeDataCount = 0;
            activeHoldings.forEach(h => {
                let details = stockDetails[h.symbol] || {};
                let price = marketPrices[h.symbol] || (h.totalCost / h.shares);
                let high = details.high52; let low = details.low52;
                
                if(high && low && high > low) {
                    rangeDataCount++;
                    let rangePct = ((price - low) / (high - low)) * 100;
                    rangePct = Math.max(0, Math.min(100, rangePct)); // 鎖定在 0-100% 之間
                    
                    let barColor = "#00E676"; // 綠色：接近谷底 (< 30%)
                    let textAdvice = "⚡ 接近底部";
                    if(rangePct > 70) { barColor = "#FF1744"; textAdvice = "🔥 接近頂部"; }
                    else if(rangePct >= 30 && rangePct <= 70) { barColor = "#FFD700"; textAdvice = "⚖️ 區間徘徊"; }

                    rangeList.innerHTML += `
                        <div class="strat-row" style="flex-direction:column; align-items:flex-start;">
                            <div style="display:flex; justify-content:space-between; width:100%;">
                                <div class="strat-name">${h.symbol} <span style="font-size:0.7rem; color:#aaa; font-weight:normal;">現價 $${price.toFixed(2)}</span></div>
                                <div class="strat-val" style="color:${barColor}">${textAdvice}</div>
                            </div>
                            <div style="display:flex; justify-content:space-between; width:100%; font-size:0.7rem; color:#888; margin-top:8px;">
                                <span>$${low} (低)</span>
                                <div class="progress-bg" style="flex:1; margin:0 15px;">
                                    <div class="progress-bar" style="width:${rangePct}%; background-color:${barColor};"></div>
                                </div>
                                <span>$${high} (高)</span>
                            </div>
                        </div>
                    `;
                }
            });
            if(rangeDataCount === 0) rangeList.innerHTML = '<div style="color:#aaa; padding:10px;">未能獲取足夠 52週 數據</div>';
        };

       // 🌟 分頁切換器 (Bottom Nav Logic) - 修復黑畫面 Bug
       window.switchPage = function(page) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if (page === 'dashboard') {
                document.querySelectorAll('.nav-item')[0].classList.add('active');
                document.getElementById('page-dashboard').classList.remove('hidden'); // 搣走隱形斗篷
                document.getElementById('page-strategy').classList.add('hidden');     // 著上隱形斗篷
                document.getElementById('add-btn').style.display = 'flex'; // 顯示浮動 + 號
                renderDashboard();
            } else {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                document.getElementById('page-dashboard').classList.add('hidden');     // 著上隱形斗篷
                document.getElementById('page-strategy').classList.remove('hidden'); // 搣走隱形斗篷
                document.getElementById('add-btn').style.display = 'none'; // 隱藏浮動 + 號以免阻住視線
                renderStrategy();
            }
        };

        window.openStockHistory = function(account, symbol) {
            let cleanTarget = cleanTicker(symbol); let niceName = getDisplayName(cleanTarget);
            document.getElementById('history-title').innerText = `📑 ${niceName} (${account})`;
            const container = document.getElementById('history-list-container'); container.innerHTML = '';
            
            const txns = transactions.filter(t => t.account === account && cleanTicker(t.symbol) === cleanTarget).reverse();
            txns.forEach(t => {
                let typeStr = t.type === 'BUY' ? '買入' : '賣出'; let typeClass = t.type === 'BUY' ? 'type-buy' : 'type-sell';
                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-detail">
                            <span class="${typeClass}">[${typeStr}]</span> ${t.date}
                            <p>成交: ${t.shares}股 @ $${t.price}</p>
                            ${t.fee > 0 ? `<p>手續費: $${t.fee}</p>` : ''}
                        </div>
                        <div class="history-actions">
                            <button class="history-edit" onclick="openEditTransaction('${t.id}')" title="修改此紀錄">✏️</button>
                            <button class="history-delete" onclick="deleteTransaction('${t.id}')" title="刪除此紀錄">🗑️</button>
                        </div>
                    </div>`;
            });
            container.innerHTML += `<div style="text-align:center; margin-top:20px; padding-top:15px; border-top:1px solid #444;"><button class="btn btn-cancel" style="background:#FF1744; width:100%; border-radius:8px;" onclick="deleteAllTransactions('${account}', '${cleanTarget}')">🗑️ 清空此股票全部紀錄</button></div>`;
            document.getElementById('history-modal').style.display = 'flex';
        };

        window.openEditTransaction = function(docId) {
            const txn = transactions.find(t => t.id === docId); if (!txn) return;
            editingTxnId = docId; document.getElementById('input-type').value = txn.type; document.getElementById('input-date').value = txn.date; document.getElementById('input-account').value = txn.account; document.getElementById('input-symbol').value = getDisplayName(txn.symbol); document.getElementById('input-shares').value = txn.shares; document.getElementById('input-price').value = txn.price; document.getElementById('input-fee').value = txn.fee || 0;
            document.getElementById('transaction-modal-title').innerText = "✏️ 修改交易紀錄"; document.getElementById('btn-save').innerText = "儲存修改";
            document.getElementById('history-modal').style.display = 'none'; document.getElementById('add-modal').style.display = 'flex'; updateAvailableSharesHint();
        };

        window.deleteTransaction = async function(docId) { if(confirm("確定刪除這筆單一交易？")) { await deleteDoc(doc(db, "users", currentUser.uid, "transactions", docId)); transactions = transactions.filter(t => t.id !== docId); document.getElementById('history-modal').style.display = 'none'; renderDashboard(); } };
        window.deleteAllTransactions = async function(account, symbol) {
            let cleanTarget = cleanTicker(symbol); let niceName = getDisplayName(cleanTarget);
            if(confirm(`⚠️ 極度危險：確定要永久刪除「${account}」裡面「${niceName}」的 所有交易紀錄 嗎？此動作無法復原！`)) {
                const txnsToDelete = transactions.filter(t => t.account === account && cleanTicker(t.symbol) === cleanTarget); const batch = writeBatch(db);
                txnsToDelete.forEach(t => { batch.delete(doc(db, "users", currentUser.uid, "transactions", t.id)); }); await batch.commit();
                transactions = transactions.filter(t => !(t.account === account && cleanTicker(t.symbol) === cleanTarget)); document.getElementById('history-modal').style.display = 'none'; renderDashboard();
            }
        };

        window.exportCSV = function() {
            if (transactions.length === 0) { alert("沒有交易紀錄可供匯出！"); return; }
            let csvContent = "\uFEFFDate,Type,Account,Symbol,Shares,Price,Fee\n";
            transactions.forEach(t => { let formattedSymbol = cleanTicker(t.symbol); let row = `${t.date},${t.type},"${t.account}","${formattedSymbol}",${t.shares},${t.price},${t.fee}`; csvContent += row + "\n"; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `QuantCraft_Transactions_${new Date().toISOString().split('T')[0]}.csv`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        document.getElementById('csv-file-input').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file || !currentUser) return; const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const csvText = event.target.result; const rows = csvText.split(/\r?\n/).filter(row => row.trim() !== ""); if (rows.length < 2) return;
                    const firstLine = rows[0]; const delimiter = (firstLine.split('\t').length > firstLine.split(',').length) ? '\t' : ',';
                    const batch = writeBatch(db); let importCount = 0; const cleanNum = (str) => { if (!str) return 0; return parseFloat(str.replace(/[^0-9.-]+/g, "")) || 0; };
                    for (let i = 1; i < rows.length; i++) {
                        let cols = delimiter === ',' ? rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/) : rows[i].split('\t');
                        if (cols.length >= 6) {
                            let rawSymbol = cleanTicker(cols[3].replace(/"/g, '').trim());
                            const newTxn = { date: cols[0].trim() || new Date().toISOString().split('T')[0], type: (cols[1].trim().toUpperCase() === 'SELL') ? 'SELL' : 'BUY', account: cols[2].replace(/"/g, '').trim() || '預設戶口', symbol: rawSymbol, shares: cleanNum(cols[4]), price: cleanNum(cols[5]), fee: cleanNum(cols[6]), timestamp: new Date(cols[0].trim()).getTime() || new Date().getTime() };
                            if (newTxn.shares > 0) { batch.set(doc(collection(db, "users", currentUser.uid, "transactions")), newTxn); importCount++; }
                        }
                    }
                    if (importCount > 0) { alert(`🔄 正在匯入 ${importCount} 筆交易...`); await batch.commit(); alert("✅ 匯入成功！"); fetchTransactionsFromCloud(); } else { alert("❌ 格式不符"); }
                } catch (err) { alert("⚠️ 匯入失敗: " + err.message); }
                document.getElementById('csv-file-input').value = ''; 
            }; reader.readAsText(file); 
        });

        window.switchTab = function(tab) { currentTab = tab; renderTabs(); renderDashboard(); };
        
        document.getElementById('add-btn').addEventListener('click', () => { 
            editingTxnId = null; document.getElementById('transaction-modal-title').innerText = "新增交易紀錄"; document.getElementById('btn-save').innerText = "記錄交易";
            ['input-symbol','input-shares','input-price','input-fee','input-current-market-price'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('validated-name').innerText = ''; document.getElementById('input-date').valueAsDate = new Date();
            document.getElementById('add-modal').style.display = 'flex'; updateAvailableSharesHint(); 
        });
        
        document.getElementById('toggle-visibility').addEventListener('click', function() { 
            isHidden = !isHidden; 
            this.innerText = isHidden ? '🙈' : '👁️'; 
            if(isHidden) { 
                document.getElementById('total-asset').innerText = '********'; 
                document.getElementById('total-cost').innerText = '********'; 
                document.getElementById('total-return').innerText = '********'; 
                document.getElementById('total-return').className = 'summary-val'; 
                document.getElementById('daily-pl').innerText = '********'; 
                document.getElementById('daily-pl').className = 'summary-val'; 
                document.getElementById('chart-section').style.display = 'none'; 
            } else { 
                renderDashboard(); 
            } 
        });
    </script>
</body>
