<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuantCraft HK - 專業交易帳本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- 基礎與全局設定 --- */
        body { margin: 0 auto; padding: 0; background-color: #121212; color: #ffffff; font-family: sans-serif; max-width: 500px; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.8); position: relative; overflow-x: hidden;}
        .hidden { display: none !important; }
        
        /* --- 登入畫面 --- */
        #auth-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%); }
        .auth-box { background-color: #1e1e1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .auth-box h2 { margin-top: 0; color: #007AFF; }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 15px; background-color: #333; border: 1px solid #555; color: white; border-radius: 8px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background-color: #007AFF; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .auth-switch { color: #888; font-size: 0.8rem; cursor: pointer; text-decoration: underline; margin-bottom: 20px; display: block;}
        .auth-error { color: #FF1744; font-size: 0.8rem; margin-bottom: 10px; min-height: 15px; }
        .google-btn { background-color: #ffffff; color: #000000; display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #ddd; margin-top: 15px;}
        .divider { display: flex; align-items: center; text-align: center; color: #555; font-size: 0.8rem; margin: 15px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .25em; } .divider:not(:empty)::after { margin-left: .25em; }

        /* --- 主程式畫面 --- */
        #app-screen { padding-bottom: 80px; min-height: 100vh; display: flex; flex-direction: column;}
        .top-bar { display: flex; justify-content: space-between; padding: 20px; align-items: center;}
        .top-icons { display: flex; align-items: center; gap: 8px; }
        .top-icons span { font-size: 1.2rem; cursor: pointer; }
        .logout-btn { font-size: 0.8rem; background-color: #333; padding: 5px 10px; border-radius: 8px; cursor: pointer; color: #aaa; border: none;}
        .csv-btn { font-size: 0.75rem; background-color: #00E676; color: #000; padding: 6px 8px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; display: flex; align-items: center; gap: 4px; white-space: nowrap;}
        .csv-btn.export { background-color: #4DA8DA; color: #fff; }
        .csv-btn.refresh { background-color: #FFD700; color: #000; }

        /* --- 卡片與戶口標籤 --- */
        .hero-card { background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%); margin: 0 20px; padding: 25px 20px; border-radius: 20px; text-align: center; position: relative;}
        .net-worth-title { color: #aaaaaa; font-size: 0.9rem; margin-bottom: 5px; }
        .net-worth-value { font-size: 2.5rem; font-weight: bold; margin: 0; }
        .daily-pl { font-size: 1rem; margin-top: 5px; font-weight: bold; } 
        .profit { color: #00E676; } .loss { color: #FF1744; }
        .last-update-label { font-size: 0.75rem; color: #888; margin-top: 10px; font-style: italic; }

        .account-tabs { display: flex; justify-content: center; margin-top: 20px; gap: 10px; flex-wrap: wrap; }
        .tab { background-color: #333; padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; color: #ccc; cursor: pointer; }
        .tab.active { background-color: #007AFF; color: white; font-weight: bold; }
        .tab-manage { background-color: #555; }

        /* --- 圖表容器 --- */
        .chart-wrapper { background-color: #1e1e1e; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: none; }
        .chart-title { text-align: center; font-size: 0.9rem; color: #aaa; margin-top: 0; margin-bottom: 15px; font-weight: bold;}

        /* --- 列表與排序 --- */
        .section-container { padding: 0 20px 20px 20px; flex: 1;}
        .section-title { font-size: 1.1rem; font-weight: bold; color: #eeeeee; margin: 0;}
        .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #sort-holdings { background: #333; color: #ccc; border: none; padding: 5px 10px; border-radius: 8px; font-size: 0.8rem; outline: none; cursor: pointer;}
        
        .list-row { background-color: #1e1e1e; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; transition: border 0.2s;}
        .list-row:hover { border: 1px solid #555; }
        .row-info h4 { margin: 0; font-size: 1.1rem; }
        .row-info p { margin: 5px 0 0 0; font-size: 0.8rem; color: #aaa; }
        .row-right { text-align: right; }
        .row-right h4 { margin: 0; font-size: 1.1rem; }
        .row-right p { margin: 5px 0 0 0; font-size: 0.8rem; font-weight: bold;}
        .tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;}
        .tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 8px; }
        .tag-green { background-color: rgba(0, 230, 118, 0.2); color: #00E676; border: 1px solid #00E676; }
        .tag-red { background-color: rgba(255, 23, 68, 0.2); color: #FF1744; border: 1px solid #FF1744; }

        /* --- 導航與浮動按鈕 --- */
        .fab { position: fixed; bottom: 90px; left: 50%; margin-left: 160px; width: 60px; height: 60px; background-color: #007AFF; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4); cursor: pointer; z-index: 10; transition: transform 0.2s;}
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background-color: #1e1e1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; z-index: 10; }
        .nav-item { text-align: center; color: #888; font-size: 0.8rem; cursor: pointer; width: 50%;}
        .nav-item.active { color: #007AFF; }
        .nav-item span { display: block; font-size: 1.5rem; margin-bottom: 3px; }

        /* --- 彈出視窗 --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: center; }
        .modal-content { background-color: #1e1e1e; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto;}
        .modal-content h3 { margin-top: 0; margin-bottom: 15px; color: #eee;}
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin-bottom: 15px; background-color: #333; border: 1px solid #555; color: white; border-radius: 8px; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 10px;}
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background-color: #555; color: white; }
        .btn-save { background-color: #007AFF; color: white; }
        
        .api-search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .api-search-box input { margin-bottom: 0; flex: 1; }
        .api-fetch-btn { background-color: #FFD700; color: #000; border: none; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        /* 🌟 優化的戶口管理列表 */
        .acc-manage-row { padding: 15px; background-color: #2c2c2c; margin-bottom: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px;}
        .acc-manage-title { font-weight: bold; font-size: 1.1rem; color: #fff;}
        .acc-manage-actions { display: flex; gap: 8px; width: 100%; }
        .acc-manage-actions button { flex: 1; border: none; border-radius: 5px; padding: 8px 0; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-edit { background: #FFD700; color: #000; }
        .btn-delete { background: #444; color: white; }
        .btn-clear { background: #9966FF; color: white; } /* 清空紀錄按鈕 */

        .history-item { padding: 12px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .history-item:last-child { border-bottom: none; }
        .type-buy { color: #00E676; font-weight: bold; }
        .type-sell { color: #FF1744; font-weight: bold; }
        .history-detail p { margin: 4px 0 0 0; font-size: 0.85rem; color: #bbb;}
        
        .history-actions { display: flex; gap: 15px; }
        .history-edit { background: none; border: none; color: #FFD700; cursor: pointer; font-size: 1.3rem; padding: 0;}
        .history-delete { background: none; border: none; color: #888; cursor: pointer; font-size: 1.3rem; padding: 0;}
        .history-edit:hover { color: #fff; }
        .history-delete:hover { color: #FF1744; }
        
        @media (max-width: 500px) { .fab { left: auto; right: 20px; margin-left: 0; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>QuantCraft HK</h2>
            <div id="auth-error" class="auth-error"></div>
            <input type="email" id="email-input" placeholder="電郵地址">
            <input type="password" id="password-input" placeholder="密碼 (最少 6 位)">
            <button class="auth-btn" id="login-btn">登入</button>
            <button class="auth-btn hidden" id="register-btn">註冊新帳號</button>
            <span class="auth-switch" id="switch-auth-mode">沒有帳號？點此註冊</span>
            <div class="divider">或者</div>
            <button class="auth-btn google-btn" id="google-login-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                使用 Google 登入
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="top-bar">
            <div class="top-icons">
                <input type="file" id="csv-file-input" accept=".csv" class="hidden">
                <button class="csv-btn" onclick="document.getElementById('csv-file-input').click()" title="匯入 CSV">📁 匯入</button>
                <button class="csv-btn export" onclick="exportCSV()" title="匯出 CSV">📤 匯出</button>
                <button class="csv-btn refresh" id="refresh-prices-btn">🔄 現價</button>
            </div>
            <div class="top-icons">
                <span title="隱藏金額" id="toggle-visibility">👁️</span>
                <button class="logout-btn" id="logout-btn">登出</button>
            </div>
        </div>

        <div id="page-dashboard">
            <div class="hero-card">
                <div class="net-worth-title">總資產淨值 (HKD)</div>
                <h1 class="net-worth-value" id="total-asset">$0.00</h1>
                <div class="daily-pl profit" id="daily-pl">+$0.00 (0.00%)</div>
                <div class="last-update-label" id="last-updated-time">最後更新: 尚未更新</div>
                <div class="account-tabs" id="tabs-container"></div>
            </div>

            <div class="chart-wrapper" id="chart-section">
                <h3 class="chart-title">📊 資產配置比例</h3>
                <canvas id="portfolioChart"></canvas>
            </div>

            <div class="section-container">
                <div class="list-header">
                    <div class="section-title" id="holdings-title">全部 持倉</div>
                    <select id="sort-holdings" onchange="renderDashboard()">
                        <option value="recent">排序: 最新交易</option>
                        <option value="pl-desc">排序: 利潤最高</option>
                        <option value="pl-asc">排序: 虧損最多</option>
                        <option value="name">排序: 代號 A-Z</option>
                    </select>
                </div>
                
                <div id="holdings-list">
                    <div style="text-align:center; color:#888;">載入中...</div>
                </div>
            </div>
        </div>

        <div class="fab" id="add-btn">+</div>
        <div class="bottom-nav">
            <div class="nav-item active"><span>📊</span>看板</div>
            <div class="nav-item"><span>🧩</span>策略</div>
        </div>

        <div class="modal" id="add-modal">
            <div class="modal-content">
                <h3 id="transaction-modal-title">新增交易紀錄</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="input-type" style="flex:1; margin-bottom:0; font-weight:bold;">
                        <option value="BUY">🟢 買入 (BUY)</option>
                        <option value="SELL">🔴 賣出 (SELL)</option>
                    </select>
                    <input type="date" id="input-date" style="flex:1; margin-bottom:0;">
                </div>

                <select id="input-account"></select>
                
                <div class="api-search-box">
                    <input type="text" id="input-symbol" placeholder="代號 (例: 0700 或 AAPL)">
                    <button class="api-fetch-btn" id="fetch-price-btn">🔍 即時價</button>
                </div>
                <div id="validated-name" style="color: #00E676; font-size: 0.8rem; margin-top: -10px; margin-bottom: 10px; height: 15px;"></div>

                <div style="display:flex; gap:10px;">
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <input type="number" id="input-shares" placeholder="股數 (例: 100)" style="margin-bottom:5px;">
                        <div id="available-shares-hint" style="color:#aaa; font-size:0.75rem; display:none; padding-left:5px;"></div>
                    </div>
                    <div style="flex:1;">
                        <input type="number" id="input-price" placeholder="成交價">
                    </div>
                </div>
                
                <input type="number" id="input-fee" placeholder="總手續費 (HKD)">
                <input type="number" id="input-current-market-price" placeholder="此股票當前最新市價 (選填)" style="border-color:#007AFF;">
                
                <div class="modal-buttons">
                    <button class="btn btn-cancel" onclick="document.getElementById('add-modal').style.display='none'">取消</button>
                    <button class="btn btn-save" id="btn-save">記錄交易</button>
                </div>
            </div>
        </div>

        <div class="modal" id="account-manage-modal">
            <div class="modal-content">
                <h3>⚙️ 戶口管理</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="new-account-name" placeholder="新增戶口 (例: 牛牛)">
                    <button class="btn btn-save" onclick="addAccount()" style="white-space:nowrap;">新增</button>
                </div>
                <div id="account-list-container"></div>
                <div class="modal-buttons" style="justify-content:center; margin-top:20px;">
                    <button class="btn btn-cancel" onclick="document.getElementById('account-manage-modal').style.display='none'">完成</button>
                </div>
            </div>
        </div>

        <div class="modal" id="reauth-modal">
            <div class="modal-content">
                <h3 style="color: #FF1744;">🔐 安全驗證</h3>
                <p id="reauth-msg" style="font-size: 0.9rem; color: #ccc; margin-bottom: 15px;"></p>
                <input type="password" id="reauth-password" placeholder="請輸入登入密碼">
                <div class="modal-buttons">
                    <button class="btn btn-cancel" onclick="document.getElementById('reauth-modal').style.display='none'">取消</button>
                    <button class="btn btn-save" id="reauth-confirm-btn" style="background-color: #FF1744;">確認清空</button>
                </div>
            </div>
        </div>

        <div class="modal" id="history-modal">
            <div class="modal-content">
                <h3 id="history-title">股票紀錄</h3>
                <div id="history-list-container" style="background:#222; border-radius:10px; padding:10px; max-height: 50vh; overflow-y: auto;"></div>
                <div class="modal-buttons" style="justify-content:center; margin-top:20px;">
                    <button class="btn btn-cancel" onclick="document.getElementById('history-modal').style.display='none'">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, writeBatch, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        // 🌟 引入密碼驗證模組
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, EmailAuthProvider, reauthenticateWithCredential, reauthenticateWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVrn8Dp88LDKHEssp1OZTQ1_G7lwb9znE",
            authDomain: "quantcraft-c0a8b.firebaseapp.com",
            projectId: "quantcraft-c0a8b",
            storageBucket: "quantcraft-c0a8b.firebasestorage.app",
            messagingSenderId: "448273574587",
            appId: "1:448273574587:web:3c95f1ba75a6fcb405179e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null; 
        let transactions = []; 
        let marketPrices = {}; 
        let myAccounts = ['富途', '匯豐', 'IB']; 
        let currentTab = '全部';
        let isHidden = false;
        let lastUpdatedTime = "從未更新"; 
        
        let portfolioChart = null; 
        let cloudStockNames = {}; 
        let editingTxnId = null;

        // 🌟 修復 1: 確保純數字 (例如 0700) 識得自動補齊 .HK
        function cleanTicker(rawSymbol) {
            if (!rawSymbol) return "";
            let clean = rawSymbol.split(' ')[0].trim();
            if (clean.startsWith('HKG:')) clean = clean.replace('HKG:', '') + '.HK';
            // 只要係 1 到 5 位純數字，就自動補 .HK
            if (/^\d{1,5}$/.test(clean)) {
                clean = clean.padStart(4, '0') + '.HK';
            }
            return clean.toUpperCase();
        }

        // 智能名稱轉換器
        function getDisplayName(rawSymbol) {
            let cleanSymbol = cleanTicker(rawSymbol);
            if (!cleanSymbol) return "未知股票";
            if (cloudStockNames && cloudStockNames[cleanSymbol]) {
                return `${cleanSymbol} ${cloudStockNames[cleanSymbol]}`;
            }
            return cleanSymbol; 
        }

        document.getElementById('input-date').valueAsDate = new Date();

        // --- 登入控制 ---
        document.getElementById('switch-auth-mode').addEventListener('click', () => {
            const isLogin = document.getElementById('login-btn').classList.contains('hidden');
            document.getElementById('login-btn').classList.toggle('hidden', isLogin);
            document.getElementById('register-btn').classList.toggle('hidden', !isLogin);
            document.getElementById('switch-auth-mode').innerText = !isLogin ? "沒有帳號？點此註冊" : "已有帳號？返回登入";
        });
        document.getElementById('register-btn').addEventListener('click', async () => { try { await createUserWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value); } catch (e) { document.getElementById('auth-error').innerText = e.message; } });
        document.getElementById('login-btn').addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value); } catch (e) { document.getElementById('auth-error').innerText = "登入失敗，請檢查帳戶或密碼"; } });
        document.getElementById('google-login-btn').addEventListener('click', async () => { try { await signInWithPopup(auth, googleProvider); } catch (e) { document.getElementById('auth-error').innerText = "Google登入失敗"; } });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                await fetchUserConfig(); fetchTransactionsFromCloud(); 
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        // --- 戶口與全域設定管理 ---
        async function fetchUserConfig() {
            const docRef = doc(db, "users", currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.accounts) myAccounts = data.accounts;
                if (data.marketPrices) marketPrices = data.marketPrices;
                if (data.stockNames) cloudStockNames = data.stockNames; 
                if (data.lastUpdatedTime) { 
                    lastUpdatedTime = data.lastUpdatedTime; 
                    document.getElementById('last-updated-time').innerText = `最後更新: ${lastUpdatedTime}`; 
                }
            } else { 
                await setDoc(docRef, { accounts: myAccounts, stockNames: {} }, { merge: true }); 
            }
            renderTabs();
        }

        window.renderTabs = function() {
            const container = document.getElementById('tabs-container');
            const select = document.getElementById('input-account');
            container.innerHTML = `<div class="tab ${currentTab === '全部' ? 'active' : ''}" onclick="switchTab('全部')">全部</div>`;
            myAccounts.forEach(acc => { container.innerHTML += `<div class="tab ${currentTab === acc ? 'active' : ''}" onclick="switchTab('${acc}')">${acc}</div>`; });
            container.innerHTML += `<div class="tab tab-manage" onclick="openAccountModal()">⚙️管理</div>`;
            select.innerHTML = '';
            myAccounts.forEach(acc => { select.innerHTML += `<option value="${acc}">${acc}</option>`; });
        };
